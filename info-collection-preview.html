<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>信息收集页面预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #2EAF7D;
      --primary-light: #E8F5EE;
      --text-primary: #333;
      --text-secondary: #999;
      --text-muted: #bbb;
      --bg-gradient-start: #E8F5EE;
      --bg-gradient-end: #f5f6f7;
      --card-bg: #fff;
      --border-color: #eee;
      --female-color: #FF69B4;
      --male-color: #5B9BD5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 35%);
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* 导航栏 */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 44px;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      background: transparent;
    }
    .navbar-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* 主容器 */
    .container {
      padding-top: 54px;
      padding-bottom: 90px;
      max-width: 375px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* 标题区 */
    .header { text-align: center; padding: 28px 24px 32px; }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* 表单卡片 */
    .form-card {
      background: var(--card-bg);
      margin: 0 16px;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .form-section {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f5f5f5;
    }
    .form-section:last-child { border-bottom: none; padding-bottom: 20px; }

    .section-label {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 18px;
    }

    /* ===== 性别选择 ===== */
    .gender-row {
      display: flex;
      justify-content: center;
      gap: 36px;
    }
    .gender-option {
      width: 120px;
      height: 140px;
      border-radius: 14px;
      border: 2px solid #e8e8e8;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .gender-option::before {
      content: '';
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 60px;
      border-radius: 50%;
      opacity: 0.12;
    }
    .gender-option.female::before { background: var(--female-color); }
    .gender-option.male::before { background: var(--male-color); }

    .gender-option.active.female {
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(46,175,125,0.18);
    }
    .gender-option.active.male {
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(46,175,125,0.18);
    }

    .gender-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    .gender-option.female .gender-icon {
      background: linear-gradient(135deg, #FFB6C1, #FF69B4); color: #fff;
    }
    .gender-option.male .gender-icon {
      background: linear-gradient(135deg, #87CEEB, #4682B4); color: #fff;
    }

    .gender-label-row {
      display: flex; align-items: center;
      z-index: 1; position: relative;
    }
    .gender-text { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-right: 4px; }
    
    .check-circle {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid #ddd;
      transition: all 0.2s ease;
      position: relative;
    }
    .gender-option.active .check-circle {
      background: var(--primary);
      border-color: var(--primary);
    }
    .check-circle::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 9px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
      opacity: 0;
    }
    .gender-option.active .check-circle::after { opacity: 1; }

    /* ===== 年月选择器 ===== */
    .date-picker-wrap { position: relative; height: 200px; overflow: hidden; }

    .picker-mask {
      position: absolute; inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.92) 0%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.92) 100%
      );
      z-index: 10;
    }
    .picker-highlight {
      position: absolute;
      top: 50%; left: 12px; right: 12px;
      height: 54px;
      transform: translateY(-50%);
      border-top: 1px solid #e8e8e8;
      border-bottom: 1px solid #e8e8e8;
      border-radius: 4px;
      z-index: 11;
    }

    .picker-cols { display: flex; height: 200px; position: relative; z-index: 1; }

    .picker-col {
      flex: 1;
      position: relative;
      overflow-y: hidden;
      touch-action: pan-y;
    }
    .picker-col.year-col { flex: 1.3; }
    .picker-col.month-col { flex: 0.7; }

    .picker-list { transition: transform 0.2s ease-out; }

    .picker-item {
      height: 46px;
      line-height: 46px;
      text-align: center;
      font-size: 19px;
      color: var(--text-muted);
      white-space: nowrap;
      user-select: none;
    }
    .picker-item.selected {
      color: var(--primary);
      font-weight: 600;
      font-size: 21px;
    }

    /* ===== 标尺选择器 ===== */
    .ruler-box { position: relative; }

    .ruler-display {
      text-align: center;
      font-size: 34px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }
    .ruler-display .unit {
      font-size: 17px;
      font-weight: 400;
      color: var(--primary);
      opacity: 0.85;
    }

    .ruler-area {
      position: relative;
      height: 110px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
    }
    .ruler-area:active { cursor: grabbing; }

    .ruler-line {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: #e8e8e8;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .ruler-ticks-track {
      position: absolute;
      top: 0;
      display: flex;
      align-items: flex-start;
      will-change: transform;
      transition: transform 0.08s linear;
    }

    .tick {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      position: relative;
    }

    .tick-bar {
      width: 1px;
      background: #d0d0d0;
      transition: background 0.1s;
    }
    .tick.minor .tick-bar { height: 9px; }
    .tick.mid   .tick-bar { height: 15px; background: #b0b0b0; }
    .tick.major .tick-bar { height: 23px; background: #888; }
    .tick.focus .tick-bar { height: 30px; width: 2px; background: var(--primary); border-radius: 1px; }

    .tick-num {
      position: absolute;
      top: 36px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      transform: translateX(-50%);
      font-variant-numeric: tabular-nums;
    }
    .tick.focus .tick-num {
      color: var(--primary);
      font-weight: 600;
      font-size: 13px;
    }

    /* 中心指示器 */
    .center-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: none;
    }
    .center-indicator .line {
      width: 2px;
      height: 42px;
      background: linear-gradient(180deg, transparent 0%, var(--primary) 15%, var(--primary) 85%, transparent 100%);
      border-radius: 1px;
    }
    .center-indicator .arrow {
      width: 0; height: 0;
      margin: 0 auto;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 8px solid var(--primary);
    }

    /* 底部按钮 */
    .bottom-btn {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 28px calc(14px + env(safe-area-inset-bottom));
      background: #fff;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .bottom-btn button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #26a06d);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(46,175,125,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .bottom-btn button:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(46,175,125,0.2);
    }
  </style>
</head>
<body>

<nav class="navbar"><span class="navbar-title">完善信息</span></nav>

<div class="container">

  <div class="header">
    <h1>完善个人信息</h1>
    <p>帮助我们为你提供更精准的断食方案</p>
  </div>

  <div class="form-card">

    <!-- 性别 -->
    <div class="form-section">
      <div class="section-label">选择您的性别</div>
      <div class="gender-row">
        <div class="gender-option female active" onclick="setGender('female',this)">
          <div class="gender-icon">&#9792;</div>
          <div class="gender-label-row">
            <span class="gender-text">女生</span><span class="check-circle"></span>
          </div>
        </div>
        <div class="gender-option male" onclick="setGender('male',this)">
          <div class="gender-icon">&#9794;</div>
          <div class="gender-label-row">
            <span class="gender-text">男生</span><span class="check-circle"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 出生年月 -->
    <div class="form-section">
      <div class="section-label">选择您的出生年月</div>
      <div class="date-picker-wrap" id="dpWrap">
        <div class="picker-mask"></div>
        <div class="picker-highlight"></div>
        <div class="picker-cols">
          <div class="picker-col year-col" id="yearCol"></div>
          <div class="picker-col month-col" id="monthCol"></div>
        </div>
      </div>
    </div>

    <!-- 身高 -->
    <div class="form-section">
      <div class="section-label">选择您的身高</div>
      <div class="ruler-box">
        <div class="ruler-display"><span id="hVal">165.0</span><span class="unit">cm</span></div>
        <div class="ruler-area" id="hrArea">
          <div class="center-indicator"><div class="arrow"></div><div class="line"></div></div>
          <div class="ruler-line"></div>
          <div class="ruler-ticks-track" id="hrTicks"></div>
        </div>
      </div>
    </div>

    <!-- 体重 -->
    <div class="form-section">
      <div class="section-label">选择您当前体重</div>
      <div class="ruler-box">
        <div class="ruler-display"><span id="wVal">65.0</span><span class="unit">kg</span></div>
        <div class="ruler-area" id="wrArea">
          <div class="center-indicator"><div class="arrow"></div><div class="line"></div></div>
          <div class="ruler-line"></div>
          <div class="ruler-ticks-track" id="wrTicks"></div>
        </div>
      </div>
    </div>

  </div><!-- /.form-card -->
</div>

<div class="bottom-btn">
  <button onclick="submitForm()">开始体验</button>
</div>

<script>
// ===== 性别 =====
let gender = 'female';
function setGender(g, el) {
  gender = g;
  document.querySelectorAll('.gender-option').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ===== 年月滚动选择器 =====
const NOW = new Date().getFullYear();
let selYear = 1995, selMonth = 1;

function initDatePicker() {
  const yCol = document.getElementById('yearCol');
  const mCol = document.getElementById('monthCol');

  // 年份列：1950 ~ 今年
  let yHtml = '<div class="picker-list">';
  for (let y = 1950; y <= NOW; y++) {
    yHtml += `<div class="picker-item${y===selYear?' selected':''}">${y}年</div>`;
  }
  yHtml += '</div>';
  yCol.innerHTML = yHtml;

  // 月份列：1~12
  let mHtml = '<div class="picker-list">';
  for (let m = 1; m <= 12; m++) {
    mHtml += `<div class="picker-item${m===selMonth?' selected':''}">${m}月</div>`;
  }
  mHtml += '</div>';
  mCol.innerHTML = mHtml;

  setPickerPos(yCol, selYear - 1950);
  setPickerPos(mCol, selMonth - 1);

  makeScrollable(yCol, (idx) => { selYear = 1950 + idx; }, 71);
  makeScrollable(mCol, (idx) => { selMonth = idx + 1; }, 12);
}

function setPickerPos(col, idx) {
  const list = col.querySelector('.picker-list');
  const itemH = 46;
  const offset = idx * itemH - (200 / 2) + (itemH / 2);
  list.style.transform = `translateY(${offset}px)`;
}

function makeScrollable(col, onSelect, totalItems) {
  let startY, startT, isDrag = false;
  const list = col.querySelector('.picker-list');
  const itemH = 46;
  const viewH = 200;
  const maxScroll = -(totalItems * itemH - viewH);

  function getCurY() {
    const m = list.style.transform.match(/translateY\(([-0-9.]+)px\)/);
    return m ? parseFloat(m[1]) : 0;
  }

  function snap() {
    let y = getCurY();
    const idx = Math.round(-y / itemH);
    const clamped = Math.max(0, Math.min(totalItems - 1, idx));
    setPickerPos(col, clamped);
    // 更新选中样式
    const items = col.querySelectorAll('.picker-item');
    items.forEach((it,i) => it.classList.toggle('selected', i === clamped));
    if (onSelect) onSelect(clamped);
  }

  col.addEventListener('touchstart', e => {
    isDrag = true; startY = e.touches[0].clientY; startT = getCurY();
    list.style.transition = 'none';
  }, {passive:true});
  
  col.addEventListener('touchmove', e => {
    if (!isDrag) return;
    const dy = e.touches[0].clientY - startY;
    let ny = startT + dy;
    ny = Math.max(maxScroll - itemH*2, Math.min(itemH*2, ny));
    list.style.transform = `translateY(${ny}px)`;
  }, {passive:true});

  col.addEventListener('touchend', () => {
    if (!isDrag) return;
    isDrag = false;
    list.style.transition = 'transform 0.25s cubic-bezier(.25,.46,.45,.94)';
    snap();
  });

  // 鼠标兼容
  col.addEventListener('mousedown', e => {
    isDrag = true; startY = e.clientX; startT = getCurY();
    list.style.transition = 'none';
  });
  window.addEventListener('mousemove', e => {
    if(!isDrag)return;
    const dy=e.clientX-startY;
    let ny=startT+dy;
    ny=Math.max(maxScroll-itemH*2,Math.min(itemH*2,ny));
    list.style.transform=`translateY(${ny}px)`;
  });
  window.addEventListener('mouseup', () => {
    if(!isDrag)return; isDrag=false;
    list.style.transition='transform 0.25s cubic-bezier(.25,.46,.45,.94)';
    snap();
  });
}

// ===== 标尺组件 =====
function buildRuler(areaId, ticksId, valId, minV, maxV, step, initV) {
  const area = document.getElementById(areaId);
  const track = document.getElementById(ticksId);
  const valEl = document.getElementById(valId);
  const range = maxV - minV;

  // 每单位宽度（总可视区域约 300px 对应 30 个单位）
  const unitW = 10; // px per unit value
  const totalW = range * unitW;
  const viewW = area.offsetWidth || 330;

  // 生成刻度 HTML
  let html = '';
  const steps = Math.round(range / step);
  for (let i = 0; i <= steps; i++) {
    const v = minV + i * step;
    const x = i * step * unitW;
    let cls = 'minor';
    if (i % 10 === 0) cls = 'major';
    else if (i % 5 === 0) cls = 'mid';

    const label = cls === 'major' ? (step >= 1 ? v : v.toFixed(step >= 1 ? 0 : String(step).split('.')[1]?.length || 0)) : '';
    html += `<div class="tick ${cls}" style="position:absolute;left:${x}px;">
      <div class="tick-bar"></div>${label?`<span class="tick-num">${label}</span>`:''}
    </div>`;
  }
  track.innerHTML = html;
  track.style.width = `${totalW}px`;

  // 初始位置居中
  const initX = ((initV - minV) / range) * totalW;
  let offsetX = viewW / 2 - initX;
  track.style.transform = `translateX(${offsetX}px)`;

  // 拖拽
  let startX, startOff, dragging = false;

  function onDown(e) {
    dragging = true;
    startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    startOff = offsetX;
    track.style.transition = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const dx = x - startX;
    offsetX = Math.max(viewW - totalW - 20, Math.min(20, startOff + dx));
    track.style.transform = `translateX(${offsetX}px)`;
    updateValue();
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    // 吸附到最近的 step 值
    const rawV = minV + ((-offsetX + viewW/2) / totalW) * range;
    const snapped = Math.round(rawV / step) * step;
    const clampedV = Math.max(minV, Math.min(maxV, snapped));
    const snapX = ((clampedV - minV) / range) * totalW;
    offsetX = viewW / 2 - snapX;
    track.style.transition = 'transform 0.2s ease-out';
    track.style.transform = `translateX(${offsetX}px)`;
    valEl.textContent = clampedV.toFixed(1);
    updateFocus(snapX);
    setTimeout(() => { track.style.transition = ''; }, 220);
  }

  function updateValue() {
    const v = minV + ((-offsetX + viewW/2) / totalW) * range;
    valEl.textContent = Math.max(minV,Math.min(maxV,v)).toFixed(1);
    updateFocus((-offsetX + viewW/2));
  }
  function updateFocus(centerPx) {
    track.querySelectorAll('.tick').forEach(t => t.classList.remove('focus'));
    // 找最近的 major 刻度加 focus
    const ticks = Array.from(track.querySelectorAll('.tick.major'));
    let closest = null, minDiff = Infinity;
    ticks.forEach(t => {
      const tx = parseFloat(t.style.left);
      if (Math.abs(tx - centerPx) < minDiff) { minDiff = Math.abs(tx-centerPx); closest=t; }
    });
    if (closest) closest.classList.add('focus');
  }

  area.addEventListener('touchstart', onDown, {passive:true});
  area.addEventListener('touchmove', onMove, {passive:true});
  area.addEventListener('touchend', onUp);
  area.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', e=>{if(dragging)onMove(e)});
  window.addEventListener('mouseup', onUp);
}

// 提交
function submitForm() {
  alert(JSON.stringify({gender,birthday:`${selYear}-${String(selMonth).padStart(2,'0')}`,height:hVal.textContent,weight:wVal.textContent},null,2));
}

// 初始化
document.addEventListener('DOMContentLoaded',()=>{
  initDatePicker();
  buildRuler('hrArea','hrTicks','hVal',30,250,0.5,165);
  buildRuler('wrArea','wrTicks','wVal',30,200,0.5,65);
});
</script>
</body>
</html>
